<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>
    <div class="water-field" aria-hidden="true"></div>
    <header class="site-header">
        <a class="brand" href="{{ url_for('splash') }}" aria-label="RIPPLE home">
            <span class="brand-mark">RIPPLE</span>
            <span class="brand-line">Onboarding & Placement by VITRA</span>
        </a>
        <nav class="nav-links" aria-label="Primary navigation">
            <a href="{{ url_for('access') }}">Access</a>
            <a href="{{ url_for('welcome') }}">Welcome</a>
            <a href="{{ url_for('questions') }}">Sequence</a>
            <a href="{{ url_for('placement') }}">Paths</a>
            <a href="{{ url_for('hr_dashboard') }}">HR</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script>
        window.RIPPLE_QUESTIONS = {{ questions|default([])|tojson }};
    </script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
